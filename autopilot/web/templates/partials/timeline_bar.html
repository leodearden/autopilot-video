<div id="timeline-bar" class="dark:bg-surface-800 border border-gray-700 rounded-lg p-4 mb-6">
    <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-white">Pipeline Progress</h2>
        <div class="flex items-center space-x-4 text-sm text-gray-400">
            <span>Elapsed: {{ elapsed }}</span>
            <span>Budget remaining: {{ budget_remaining }}</span>
        </div>
    </div>

    <!-- Overall progress bar -->
    <div class="w-full bg-gray-700 rounded-full h-3 mb-2">
        <div class="bg-blue-500 h-3 rounded-full" style="width: {{ progress_pct }}%"></div>
    </div>
    <div class="text-sm text-gray-400 text-right">
        {{ total_done }}/{{ total_jobs }} jobs done ({{ progress_pct }}%)
    </div>
</div>
