<div class="space-y-4">
    <div class="dark:bg-surface-800 rounded-lg p-4">
        <h3 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">CLIP Embedding Coverage</h3>
        {% if embedding_count > 0 %}
        <div class="space-y-3">
            <div class="text-lg text-gray-100">
                {{ embedding_count }} of {{ total_frames }} frames sampled ({{ coverage_pct }}%)
            </div>
            <!-- Progress bar -->
            <div class="w-full bg-gray-700 rounded-full h-2">
                <div class="bg-cyan-500 h-2 rounded-full" style="width: {{ coverage_pct }}%"></div>
            </div>
            <p class="text-sm text-gray-400">
                Embeddings extracted at sampled frame intervals from the source video.
            </p>
        </div>
        {% else %}
        <p class="text-gray-500">No embeddings generated yet.</p>
        {% endif %}
    </div>
</div>
