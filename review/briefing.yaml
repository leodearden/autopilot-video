# Review briefing — contextualises /review runs with durable project truths.
# Auto-generated by /review-briefing. Human edits preserved on update.
# Last updated: 2026-03-26T00:00:00Z

project: autopilot-video

# --- Purpose -----------------------------------------------------------
# Self-hosted, LLM-orchestrated video editing pipeline.  Raw multi-day
# footage (action cameras, audio recorders) goes in; review-ready YouTube
# videos come out within a 36-hour wall-clock budget.  Single creator,
# single machine (RTX 3090 24 GB, 128 GB RAM), no cloud dependencies
# beyond Claude API and YouTube upload.

# --- Review priorities --------------------------------------------------
# 1. E2E integration of existing features — this is where pain is expected.
#    Look for broken wiring between modules, missing integration tests, and
#    missed opportunities for partial integration or e2e test coverage.
# 2. Task coverage invariant — every known gap or defect MUST be tracked by
#    an existing Task.  Every PRD requirement MUST be covered by a Task.
#    Flag anything untracked.
# 3. Review widely as well as deeply — the owner doesn't know what they
#    don't know.

conventions:
  - rule: "LLM calls must use invoke_claude(), never the Anthropic SDK directly"
    why: >
      Session auth via Claude CLI avoids API key management.  SDK path exists
      only as a CI/fallback option.  Enforced at test time via
      inspect.getsource() checks on stage modules.

  - rule: "Every analysis stage must check its checkpoint query (has_transcript, has_detections, etc.) before processing a file"
    why: >
      Idempotent re-runs are a core design guarantee.  Without checkpoint
      checks, re-running a stage would duplicate work or corrupt data.
      Reviewers should verify every stage's main loop guards on the
      appropriate has_* check.

  - rule: "Dynamic SQL column names must be validated against a frozen whitelist"
    why: >
      SQLite doesn't support parameterised column identifiers.  The
      _NARRATIVE_ALLOWED_COLUMNS frozenset (and similar patterns) is the
      injection mitigation.  The # noqa: S608 suppression is intentional.

  - rule: "All task operations route through fused-memory MCP, never Taskmaster directly"
    why: >
      The TaskInterceptor must see every state transition to trigger
      reconciliation.  Direct Taskmaster access bypasses this.

  - rule: "Every known gap or defect must be fully covered by an existing Task"
    why: >
      Project invariant set by the owner.  If /review finds an issue that
      has no tracking task, that's a finding in itself.  Similarly, every
      PRD requirement must map to a task.

  - rule: "Web route handlers open and close their own CatalogDB per-request via get_db()"
    why: >
      Single-user console on SQLite WAL.  Per-request connections are simpler
      and safer than pooling (no state contamination, no locking).  Looks
      like a leak but is intentional.

# --- Layers (this is a single-package project, not multi-subproject) ----

layers:
  pipeline-core:
    purpose: >
      9-stage DAG (INGEST -> ANALYZE -> CLASSIFY -> NARRATE -> SCRIPT ->
      EDL -> SOURCE_ASSETS -> RENDER -> UPLOAD) that transforms raw footage
      into finished videos.  Each stage reads/writes to the SQLite catalog.
      The pipeline is the reason the project exists.

    key_scenarios:
      - "A full pipeline run completes all 9 stages with correct DB state at each boundary"
      - "Re-running a stage skips already-processed files via checkpoint queries (has_*)"
      - "SIGINT/SIGTERM triggers graceful shutdown — current items drain, remaining stages skip"
      - "Errors in one stage propagate correctly: dependents are skipped, not silently broken"
      - "Gate system blocks at pause boundaries and resumes on approval"
      - "Individual CLI commands (autopilot analyze, etc.) run stages without gates or job tracking"

    what_working_means:
      - "Full pipeline run produces correct DB state at every stage boundary"
      - "Checkpoint queries prevent duplicate processing on re-runs"
      - "All stage functions accept and correctly use run_id/emit_fn for job tracking"
      - "Gate polling loop responds to approve/skip/timeout"
      - "Shutdown event is checked between items in every stage's inner loop"

    key_decisions:
      - decision: "LLM via claude CLI subprocess, SDK as optional fallback"
        why: "Session auth avoids API key management; SDK path for CI"

      - decision: "run_id is None branching duplicated in every stage function"
        why: "Job-tracking DB failures must not block stage execution; duplication makes the plain-execution path explicit"

      - decision: "GPUScheduler(total_vram=0) in orchestrator — VRAM enforcement dormant"
        why: "Scaffolding present; individual analysis modules self-manage model loading"

      - decision: "Render uses tempfile.TemporaryDirectory for segment assembly"
        why: "Partial segments discarded on failure; simplicity over partial-resume"

    known_gaps:
      - what: "VRAM budget enforcement is scaffolded but not active"
        why: "Analysis modules self-manage; scheduler acts as coordinator only"
        tracking: null

    exclude:
      - ".worktrees/ — orchestrator agent working copies"
      - "autopilot/prompts/ — static Markdown prompt templates, not application code"
      - "data/ — runtime data directory"

  database:
    purpose: >
      CatalogDB wraps SQLite (WAL mode) as the single source of truth.
      19 tables spanning media metadata, ML analysis results, narrative/edit
      planning, and pipeline control (gates, jobs, events, runs).

    key_scenarios:
      - "Batch writes (detections, faces, embeddings, audio_events) handle high-volume GPU inference output via executemany"
      - "query_media builds dynamic SQL with filtering, sorting whitelist, and EXISTS subqueries for analysis flags — without loading BLOBs"
      - "upsert_edit_plan preserves existing columns when only one field is updated"
      - "Pipeline control tables (gates, jobs, events, runs) support concurrent read from web console while orchestrator writes"
      - "Context manager commit/rollback: with db: blocks commit on success, rollback on exception"

    what_working_means:
      - "All 19 tables created on init"
      - "WAL mode enabled; concurrent readers don't block writer"
      - "Checkpoint queries return correct boolean for processed/unprocessed files"
      - "Batch inserts are atomic and idempotent"

    key_decisions:
      - decision: "upsert_edit_plan does read-then-write instead of INSERT OR REPLACE"
        why: "INSERT OR REPLACE would zero out unset fields (edl_json, render_path, etc.)"

      - decision: "update_narrative validates column names against a frozenset whitelist"
        why: "SQLite doesn't support parameterised column identifiers; whitelist prevents injection"

      - decision: "Tests use isolation_level=None (autocommit) on in-memory DBs"
        why: "Avoids transaction boilerplate in tests; production code uses explicit with db: blocks"

    known_gaps: []

    exclude: []

  web-console:
    purpose: >
      FastAPI + Jinja2 + HTMX management console for monitoring pipeline
      progress, browsing media, configuring gates, and reviewing artifacts.
      Single-user, localhost-only.  Must never block the pipeline or use GPU.

    key_scenarios:
      - "Dashboard shows real-time stage progress via SSE-driven HTMX partial swaps"
      - "Gate configuration changes (mode, timeout, presets) take effect and orchestrator respects them"
      - "Narrative review: approve/reject/bulk-approve correctly updates DB status and gate state"
      - "Media browser: filtering, pagination, and detail tabs load analysis data without BLOBs"
      - "SSE reconnection resumes from Last-Event-ID without missing events"

    what_working_means:
      - "Dashboard, gates, media list, media detail, and narrative review pages render correctly"
      - "HTMX partial responses return valid HTML fragments (not JSON) for swap targets"
      - "SSE stream delivers events within seconds of orchestrator writing them"
      - "Gate approve/skip actions update the DB and unblock the orchestrator's polling loop"

    key_decisions:
      - decision: "Tailwind via CDN play script, no build step"
        why: "Zero frontend tooling; acceptable for single-user localhost console"

      - decision: "Per-request SQLite connections, no pooling"
        why: "Single-user; WAL handles concurrency; simpler than shared connection state"

      - decision: "Route handlers branch on is_htmx() to return JSON or HTML partials"
        why: "Same endpoint serves API consumers and HTMX swap targets"

      - decision: "SSE polls pipeline_events table every 1s, prunes events older than 24h"
        why: "Simple polling over SQLite; no IPC or message broker needed"

    known_gaps:
      - what: "Pipeline detail, review pages (cluster/script/EDL/render), and notifications — regressions from hardening cycle"
        why: "Tasks 42, 47-50, 51 marked done but routes/templates deleted or incomplete in working tree"
        tracking: "Task 99 (restore umbrella, depends on 63, 70)"

      - what: "Settings page linked in nav but no route"
        why: "PRD mentions settings page for console prefs/notification config"
        tracking: "Task 101"

      - what: "Narrative edit button returns JSON instead of HTML partial"
        why: "No edit form template; hx-get points to JSON API endpoint"
        tracking: "Task 100"

      - what: "Gate SSE events (gate_waiting, gate_approved, gate_skipped) arrive but have no client-side handler"
        why: "Dashboard JS only handles stage_started, stage_completed, job_progress"
        tracking: "Task 102"

      - what: "Notification SSE events: server never emits, bell badge always hidden"
        why: "Task 51 marked done but wiring incomplete"
        tracking: "Task 103"

      - what: "Deleted test files (test_cluster_review.py, test_render_review.py, test_web_e2e.py) — coverage regression"
        why: "Restructuring during hardening tasks; restoration included in task 99 scope"
        tracking: "Tasks 64, 70, 82, 83, 99"

    exclude:
      - "autopilot/web/static/ — minimal CSS/JS, not worth reviewing for logic"

  test-suite:
    purpose: >
      Comprehensive test coverage via pytest.  Unit tests with mocked ML
      dependencies, integration tests against real SQLite, behavioral
      contract tests via inspect, and structural meta-tests for CI config.

    key_scenarios:
      - "All tests pass in CI without GPU libraries installed (mocked via sys.modules patching)"
      - "Web tests use file-backed DBs for WAL compatibility with TestClient"
      - "Orchestrator tests cover every stage's shutdown/resume, gate logic, and job tracking"
      - "E2E smoke test runs full pipeline with all 22 stage modules mocked"

    what_working_means:
      - "pytest passes with 70% coverage threshold (CI only)"
      - "No test requires GPU, internet, or external services"
      - "Fixtures clean up (DB connections closed, temp dirs removed)"

    key_decisions:
      - decision: "inspect.getsource() used to enforce architectural constraints in tests"
        why: "Catches import violations and algorithm choices that can't be expressed as behavior"

      - decision: "patch.dict(sys.modules, ...) for ML module mocking"
        why: "Avoids needing cv2/whisperx/etc. installed; injects fakes before import"

      - decision: "Pre-import of submodules before @patch in orchestrator/e2e tests"
        why: "unittest.mock needs submodule in sys.modules before patch can resolve attribute on empty __init__.py"

    known_gaps:
      - what: "No browser-level or JavaScript tests"
        why: "No JS test runner (Jest, Playwright); SSE/HTMX mechanics verified structurally only"
        tracking: "Task 104"

      - what: "Deleted test files leave coverage gaps for cluster review, render review, and cross-page e2e"
        why: "Active restructuring; in-progress tasks should restore coverage"
        tracking: "Tasks 64, 70, 82, 83"

    exclude:
      - "tests/fixtures/ — YAML config fixtures, not test logic"
