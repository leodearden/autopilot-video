# Orchestrator configuration for autopilot-video
# Overrides dark-factory defaults

# Concurrency
max_concurrent_tasks: 12
max_per_module: 1
lock_depth: 4
module_overrides:
  tests: 2

# Verification commands
test_command: "pytest"
lint_command: "ruff check"
type_check_command: "pyright"

# Fused memory HTTP server
fused_memory:
  url: "http://localhost:8002"
  project_id: "autopilot_video"
  config_path: "/home/leo/src/autopilot-video/fused-memory-config.yaml"
  server_command: []

# Sandbox (disabled: bwrap uid map not permitted on this kernel)
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8101
  host: "127.0.0.1"

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Project root
project_root: "/home/leo/src/autopilot-video"
